<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MKTWATCH — Stock Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c0e; --surface: #0d1417; --surface2: #111920;
      --border: #1e2d33; --border2: #243540;
      --green: #00d084; --green-dim: rgba(0,208,132,0.12);
      --red: #ff4757; --red-dim: rgba(255,71,87,0.12);
      --amber: #ffa502; --blue: #1e90ff;
      --text: #ccd6dd; --text2: #7a9aaa; --text3: #3d5a66;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
    body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 9999; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: var(--mono); font-size: 1.1rem; font-weight: 600; letter-spacing: 0.15em; color: var(--green); }
    .logo span { color: var(--text2); font-weight: 300; }
    .market-status { display: flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 0.7rem; color: var(--text2); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s ease infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .clock { font-family: var(--mono); font-size: 0.75rem; color: var(--text2); }
    main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }
    .api-banner { background: rgba(255,165,2,0.08); border: 1px solid rgba(255,165,2,0.3); border-radius: 4px; padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-family: var(--mono); font-size: 0.75rem; color: var(--amber); display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .api-banner input { flex: 1; min-width: 200px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,165,2,0.3); border-radius: 3px; padding: 0.4rem 0.6rem; color: var(--text); font-family: var(--mono); font-size: 0.75rem; outline: none; }
    .api-banner input:focus { border-color: var(--amber); }
    .api-banner a { color: var(--amber); text-decoration: underline; white-space: nowrap; }
    .search-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .ticker-input { flex: 1; min-width: 180px; background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; padding: 0.75rem 1rem; color: var(--text); font-family: var(--mono); font-size: 0.9rem; letter-spacing: 0.05em; outline: none; transition: border-color 0.2s; }
    .ticker-input:focus { border-color: var(--green); }
    .ticker-input::placeholder { color: var(--text3); }
    .range-select { background: var(--surface); border: 1px solid var(--border2); border-radius: 4px; padding: 0.75rem 1rem; color: var(--text); font-family: var(--mono); font-size: 0.85rem; outline: none; cursor: pointer; }
    .btn { background: var(--green); color: #000; border: none; border-radius: 4px; padding: 0.75rem 1.5rem; font-family: var(--mono); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap; }
    .btn:hover { opacity: 0.85; } .btn:active { transform: scale(0.97); } .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .watchlist { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .chip { display: flex; align-items: center; gap: 0.4rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 0.3rem 0.7rem; font-family: var(--mono); font-size: 0.75rem; color: var(--text2); cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .chip:hover { border-color: var(--green); color: var(--green); }
    .chip.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }
    .chip-remove { color: var(--text3); font-size: 0.9rem; line-height: 1; transition: color 0.15s; }
    .chip:hover .chip-remove { color: var(--red); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1rem; }
    .stat-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 0.4rem; }
    .stat-value { font-family: var(--mono); font-size: 1.3rem; font-weight: 600; color: var(--text); }
    .stat-value.up { color: var(--green); } .stat-value.down { color: var(--red); }
    .stat-sub { font-family: var(--mono); font-size: 0.7rem; color: var(--text2); margin-top: 0.2rem; }
    .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .chart-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .chart-ticker { font-family: var(--mono); font-size: 1rem; font-weight: 600; color: var(--text); }
    .chart-title { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.1em; color: var(--text2); text-transform: uppercase; margin-top: 0.2rem; }
    .chart-wrap { position: relative; height: 320px; }
    .data-table { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .table-header { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; padding: 0.6rem 1rem; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }
    .table-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; padding: 0.55rem 1rem; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.78rem; color: var(--text2); transition: background 0.15s; }
    .table-row:last-child { border-bottom: none; } .table-row:hover { background: var(--surface2); }
    .table-row .up { color: var(--green); } .table-row .down { color: var(--red); }
    .empty-state { text-align: center; padding: 4rem 2rem; font-family: var(--mono); color: var(--text3); }
    .empty-state .big { font-size: 2rem; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.8rem; line-height: 1.8; }
    .loading { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 3rem; font-family: var(--mono); font-size: 0.8rem; color: var(--text3); }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: var(--red-dim); border: 1px solid rgba(255,71,87,0.3); border-radius: 4px; padding: 0.75rem 1rem; font-family: var(--mono); font-size: 0.78rem; color: var(--red); margin-bottom: 1rem; }
  </style>
</head>
<body>
<header>
  <div class="logo">MKT<span>WATCH</span></div>
  <div class="market-status"><div class="status-dot"></div><span id="marketStatus">LIVE</span></div>
  <div class="clock" id="clock">--:--:--</div>
</header>
<main>
  <div class="api-banner">
    <span>⚙ FINNHUB API KEY:</span>
    <input type="text" id="apiKey" placeholder="Paste your free Finnhub API key here..."/>
    <a href="https://finnhub.io/register" target="_blank">Get free key at finnhub.io →</a>
  </div>
  <div class="search-row">
    <input class="ticker-input" id="tickerInput" type="text" placeholder="Enter ticker (e.g. AAPL, MSFT, TSLA)..." onkeydown="if(event.key==='Enter') addAndLoad()"/>
    <select class="range-select" id="rangeSelect">
      <option value="7">1 Week</option>
      <option value="30" selected>1 Month</option>
      <option value="90">3 Months</option>
      <option value="180">6 Months</option>
      <option value="365">1 Year</option>
    </select>
    <button class="btn" onclick="addAndLoad()">+ ADD / LOAD</button>
  </div>
  <div class="watchlist" id="watchlist"></div>
  <div class="error-msg" id="errorMsg" style="display:none"></div>
  <div class="stats-grid" id="statsGrid" style="display:none">
    <div class="stat-card"><div class="stat-label">Current Price</div><div class="stat-value" id="statPrice">--</div><div class="stat-sub" id="statTicker">--</div></div>
    <div class="stat-card"><div class="stat-label">Day Change $</div><div class="stat-value" id="statChange">--</div><div class="stat-sub" id="statChangePct">--</div></div>
    <div class="stat-card"><div class="stat-label">Day High</div><div class="stat-value" id="statHigh">--</div></div>
    <div class="stat-card"><div class="stat-label">Day Low</div><div class="stat-value" id="statLow">--</div></div>
    <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value" id="statOpen">--</div></div>
    <div class="stat-card"><div class="stat-label">Prev Close</div><div class="stat-value" id="statPrevClose">--</div></div>
  </div>
  <div class="chart-container" id="chartContainer">
    <div class="empty-state">
      <div class="big">📈</div>
      <p>Enter a ticker symbol above and press ADD / LOAD<br/>to display price history and live quotes.<br/><br/>Requires a free Finnhub API key from finnhub.io</p>
    </div>
  </div>
  <div id="tableContainer"></div>
</main>
<script>
  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false});
    const h=now.getHours(), d=now.getDay();
    document.getElementById('marketStatus').textContent = (d>=1&&d<=5&&h>=9&&h<16)?'MARKET OPEN':'MARKET CLOSED';
  }
  setInterval(updateClock,1000); updateClock();

  // State
  let tickers = JSON.parse(localStorage.getItem('mktw_tickers')||'["AAPL","MSFT","GOOGL"]');
  let active = tickers[0]||null;
  let chart = null;

  function save() { localStorage.setItem('mktw_tickers', JSON.stringify(tickers)); }

  function renderWatchlist() {
    document.getElementById('watchlist').innerHTML = tickers.map(t=>`
      <div class="chip ${t===active?'active':''}" onclick="selectAndLoad('${t}')">
        <span>${t}</span>
        <span class="chip-remove" onclick="event.stopPropagation();remove('${t}')">×</span>
      </div>`).join('');
  }

  function selectAndLoad(t) { active=t; renderWatchlist(); loadData(); }

  function addAndLoad() {
    const val = document.getElementById('tickerInput').value.trim().toUpperCase();
    if (!val) return;
    if (!tickers.includes(val)) { tickers.push(val); save(); }
    document.getElementById('tickerInput').value='';
    active=val; renderWatchlist(); loadData();
  }

  function remove(t) {
    tickers=tickers.filter(x=>x!==t); save();
    if(active===t){ active=tickers[0]||null; }
    renderWatchlist();
    if(!active) resetDisplay(); else loadData();
  }

  function resetDisplay() {
    document.getElementById('statsGrid').style.display='none';
    document.getElementById('chartContainer').innerHTML=`<div class="empty-state"><div class="big">📈</div><p>Add a ticker to get started.</p></div>`;
    document.getElementById('tableContainer').innerHTML='';
  }

  function showError(msg) {
    const el=document.getElementById('errorMsg');
    el.textContent=msg; el.style.display='block';
    setTimeout(()=>el.style.display='none',7000);
  }

  async function loadData() {
    if(!active) return;
    const key=document.getElementById('apiKey').value.trim();
    if(!key) return showError('Please enter your Finnhub API key above. Get one free at finnhub.io');

    document.getElementById('chartContainer').innerHTML=`<div class="loading"><div class="spinner"></div> Loading ${active}...</div>`;
    document.getElementById('statsGrid').style.display='none';
    document.getElementById('tableContainer').innerHTML='';

    try {
      const [quoteRes, candleRes] = await Promise.all([
        fetch(`https://finnhub.io/api/v1/quote?symbol=${active}&token=${key}`),
        fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${active}&resolution=D&from=${Math.floor(Date.now()/1000)-parseInt(document.getElementById('rangeSelect').value)*86400}&to=${Math.floor(Date.now()/1000)}&token=${key}`)
      ]);
      const quote = await quoteRes.json();
      const candles = await candleRes.json();

      if(quote.error) throw new Error(quote.error);
      if(!quote.c||quote.c===0) throw new Error(`No data for "${active}". Verify the ticker symbol.`);
      if(candles.s==='no_data') throw new Error(`No historical data for "${active}".`);

      renderStats(active, quote);
      renderChart(active, candles);
      renderTable(candles);
    } catch(e) {
      document.getElementById('chartContainer').innerHTML=`<div class="empty-state"><div class="big">⚠</div><p>${e.message}</p></div>`;
      showError(e.message);
    }
  }

  function renderStats(ticker, q) {
    const chg=q.c-q.pc, pct=((chg/q.pc)*100).toFixed(2), up=chg>=0;
    document.getElementById('statsGrid').style.display='grid';
    document.getElementById('statPrice').textContent=`$${q.c.toFixed(2)}`;
    document.getElementById('statTicker').textContent=ticker;
    document.getElementById('statChange').textContent=`${up?'+':''}$${chg.toFixed(2)}`;
    document.getElementById('statChange').className=`stat-value ${up?'up':'down'}`;
    document.getElementById('statChangePct').textContent=`${up?'+':''}${pct}%`;
    document.getElementById('statHigh').textContent=`$${q.h.toFixed(2)}`;
    document.getElementById('statLow').textContent=`$${q.l.toFixed(2)}`;
    document.getElementById('statOpen').textContent=`$${q.o.toFixed(2)}`;
    document.getElementById('statPrevClose').textContent=`$${q.pc.toFixed(2)}`;
  }

  function renderChart(ticker, c) {
    if(chart) chart.destroy();
    const days=parseInt(document.getElementById('rangeSelect').value);
    const labels=c.t.map(ts=>new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    const isUp=c.c[c.c.length-1]>=c.c[0];
    const lc=isUp?'#00d084':'#ff4757', fc=isUp?'rgba(0,208,132,0.08)':'rgba(255,71,87,0.08)';

    document.getElementById('chartContainer').innerHTML=`
      <div class="chart-header">
        <div><div class="chart-ticker">${ticker}</div><div class="chart-title">CLOSING PRICE — ${days}D HISTORY</div></div>
      </div>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>`;

    chart = new Chart(document.getElementById('priceChart').getContext('2d'),{
      type:'line',
      data:{ labels, datasets:[{ label:ticker, data:c.c, borderColor:lc, backgroundColor:fc, borderWidth:2, pointRadius:days<=30?3:0, pointHoverRadius:5, pointBackgroundColor:lc, fill:true, tension:0.3 }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{intersect:false,mode:'index'},
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:'#0d1417',borderColor:'#1e2d33',borderWidth:1,titleColor:'#7a9aaa',bodyColor:'#ccd6dd',titleFont:{family:'IBM Plex Mono',size:11},bodyFont:{family:'IBM Plex Mono',size:13},callbacks:{label:ctx=>` $${ctx.parsed.y.toFixed(2)}`}}
        },
        scales:{
          x:{grid:{color:'#1e2d33'},ticks:{color:'#3d5a66',font:{family:'IBM Plex Mono',size:10},maxTicksLimit:8}},
          y:{position:'right',grid:{color:'#1e2d33'},ticks:{color:'#7a9aaa',font:{family:'IBM Plex Mono',size:11},callback:v=>`$${v.toFixed(0)}`}}
        }
      }
    });
  }

  function renderTable(c) {
    const rows=c.t.slice(-15).reverse().map((ts,i)=>{
      const idx=c.t.length-1-i;
      const date=new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      const prev=c.c[idx-1];
      const chg=prev?((c.c[idx]-prev)/prev*100).toFixed(2):null;
      const up=chg&&parseFloat(chg)>=0;
      return `<div class="table-row">
        <span>${date}</span>
        <span>$${c.o[idx].toFixed(2)}</span>
        <span>$${c.h[idx].toFixed(2)}</span>
        <span>$${c.l[idx].toFixed(2)}</span>
        <span>$${c.c[idx].toFixed(2)}</span>
        <span class="${chg?(up?'up':'down'):''}">${chg?(up?'+':'')+chg+'%':'—'}</span>
      </div>`;
    }).join('');

    document.getElementById('tableContainer').innerHTML=`
      <div class="data-table">
        <div class="table-header"><span>DATE</span><span>OPEN</span><span>HIGH</span><span>LOW</span><span>CLOSE</span><span>CHG%</span></div>
        ${rows}
      </div>`;
  }

  renderWatchlist();
</script>
</body>
</html>
