<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My First App</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #ff4d6d;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,229,255,0.06) 0%, transparent 70%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.3rem 0.8rem;
      border-radius: 2px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    h1 span {
      color: var(--accent);
      position: relative;
    }

    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--accent2);
      transform: scaleX(0);
      transform-origin: left;
      animation: lineIn 0.5s ease forwards 1.1s;
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.6s;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.8s;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem 1rem;
      transition: border-color 0.2s, transform 0.2s;
      cursor: default;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .card-icon {
      font-size: 1.8rem;
      margin-bottom: 0.75rem;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .card-desc {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1s;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes lineIn {
      to { transform: scaleX(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">// GITHUB PAGES DEPLOYMENT TEST</div>

    <h1>It <span>Works.</span></h1>

    <p class="subtitle">
      Your first GitHub Pages deployment is live.<br/>
      This is the beginning of the pipeline.
    </p>

    <div class="cards">
      <div class="card">
        <div class="card-icon">⚡</div>
        <div class="card-title">Fast Deploy</div>
        <div class="card-desc">git push → live in seconds</div>
      </div>
      <div class="card">
        <div class="card-icon">🌐</div>
        <div class="card-title">Public URL</div>
        <div class="card-desc">Accessible anywhere</div>
      </div>
      <div class="card">
        <div class="card-icon">🆓</div>
        <div class="card-title">Free Forever</div>
        <div class="card-desc">No credit card needed</div>
      </div>
    </div>

    <div class="status">
      <div class="dot"></div>
      DEPLOYED &nbsp;·&nbsp; buddahstudios.github.io
    </div>
  </div>
</body>
</html>
